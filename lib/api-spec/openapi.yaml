openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: EncadrePro API – gestion d'un atelier d'encadrement
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard statistics
  - name: clients
    description: Client management
  - name: produits
    description: Product catalog
  - name: devis
    description: Quote management
  - name: factures
    description: Invoice management
  - name: atelier
    description: Workshop settings
  - name: import
    description: Bulk data import from FileMaker exports (CSV / XLSX)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ──────────────── DASHBOARD ────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard KPI stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/ca-mensuel:
    get:
      operationId: getDashboardCaMensuel
      tags: [dashboard]
      summary: Monthly revenue for the last 12 months
      responses:
        "200":
          description: Monthly revenue array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaMensuel"

  /dashboard/recent-devis:
    get:
      operationId: getDashboardRecentDevis
      tags: [dashboard]
      summary: Last 5 quotes
      responses:
        "200":
          description: Recent quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentDoc"

  /dashboard/recent-factures:
    get:
      operationId: getDashboardRecentFactures
      tags: [dashboard]
      summary: Last 5 invoices
      responses:
        "200":
          description: Recent invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentDoc"

  # ──────────────── CLIENTS ────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"

    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

    put:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /clients/{id}/stats:
    get:
      operationId: getClientStats
      tags: [clients]
      summary: Get stats for a specific client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientStats"

  # ──────────────── PRODUITS ────────────────
  /produits:
    get:
      operationId: listProduits
      tags: [produits]
      summary: List products
      parameters:
        - name: type_code
          in: query
          schema:
            type: string
            enum: [VR, FA, AU, SD, EN]
        - name: type
          in: query
          schema:
            type: string
        - name: fournisseur_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Produit"

    post:
      operationId: createProduit
      tags: [produits]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduitBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produit"

  /produits/{id}:
    put:
      operationId: updateProduit
      tags: [produits]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduitBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produit"

    delete:
      operationId: deleteProduit
      tags: [produits]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /produits/{id}/toggle:
    patch:
      operationId: toggleProduitActif
      tags: [produits]
      summary: Toggle product active status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produit"

  # ──────────────── FOURNISSEURS ────────────────
  /fournisseurs:
    get:
      operationId: listFournisseurs
      tags: [fournisseurs]
      summary: List suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fournisseur"
    post:
      operationId: createFournisseur
      tags: [fournisseurs]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFournisseurBody"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fournisseur"

  /fournisseurs/{id}:
    get:
      operationId: getFournisseur
      tags: [fournisseurs]
      summary: Get a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fournisseur"
    put:
      operationId: updateFournisseur
      tags: [fournisseurs]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFournisseurBody"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fournisseur"
    delete:
      operationId: deleteFournisseur
      tags: [fournisseurs]
      summary: Delete a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ──────────────── DEVIS ────────────────
  /devis:
    get:
      operationId: listDevis
      tags: [devis]
      summary: List quotes
      parameters:
        - name: statut
          in: query
          schema:
            type: string
        - name: client_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Devis"

    post:
      operationId: createDevis
      tags: [devis]
      summary: Create a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDevisBody"
      responses:
        "201":
          description: Created quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Devis"

  /devis/{id}:
    get:
      operationId: getDevis
      tags: [devis]
      summary: Get a quote with its lines
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevisDetail"

    delete:
      operationId: deleteDevis
      tags: [devis]
      summary: Delete a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /devis/{id}/statut:
    patch:
      operationId: updateDevisStatut
      tags: [devis]
      summary: Update quote status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatutBody"
      responses:
        "200":
          description: Updated quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Devis"

  /devis/{id}/lignes:
    put:
      operationId: saveDevisLignes
      tags: [devis]
      summary: Save all lines for a quote (replaces existing)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveLignesBody"
      responses:
        "200":
          description: Updated quote with recalculated totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Devis"

  /devis/{id}/convertir:
    post:
      operationId: convertDevisToFacture
      tags: [devis]
      summary: Convert quote to invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created invoice from quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Facture"

  # ──────────────── FACTURES ────────────────
  /factures:
    get:
      operationId: listFactures
      tags: [factures]
      summary: List invoices
      parameters:
        - name: statut
          in: query
          schema:
            type: string
        - name: client_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Facture"

    post:
      operationId: createFacture
      tags: [factures]
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFactureBody"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Facture"

  /factures/{id}:
    get:
      operationId: getFacture
      tags: [factures]
      summary: Get an invoice with lines and payments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FactureDetail"

    delete:
      operationId: deleteFacture
      tags: [factures]
      summary: Delete an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /factures/{id}/statut:
    patch:
      operationId: updateFactureStatut
      tags: [factures]
      summary: Update invoice status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatutBody"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Facture"

  /factures/{id}/paiements:
    post:
      operationId: addPaiement
      tags: [factures]
      summary: Add a payment to an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaiementBody"
      responses:
        "201":
          description: Added payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Acompte"

  # ──────────────── ATELIER ────────────────
  /atelier:
    get:
      operationId: getAtelier
      tags: [atelier]
      summary: Get workshop settings
      responses:
        "200":
          description: Workshop settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Atelier"

    put:
      operationId: saveAtelier
      tags: [atelier]
      summary: Save workshop settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveAtelierBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Atelier"

  /import/fournisseurs:
    post:
      operationId: importFournisseurs
      tags: [import]
      summary: Bulk-import suppliers from a FileMaker CSV/XLSX export
      parameters:
        - in: query
          name: dry_run
          required: false
          schema: { type: string, enum: ["true", "false"] }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
              required: [file]
      responses:
        "200":
          description: Import report (real or dry-run)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportReport" }

  /import/clients:
    post:
      operationId: importClients
      tags: [import]
      summary: Bulk-import clients from a FileMaker CSV/XLSX export
      parameters:
        - in: query
          name: dry_run
          required: false
          schema: { type: string, enum: ["true", "false"] }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
              required: [file]
      responses:
        "200":
          description: Import report (real or dry-run)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportReport" }

  /import/produits:
    post:
      operationId: importProduits
      tags: [import]
      summary: Bulk-import products from a FileMaker CSV/XLSX export
      description: |
        If the file contains a `Type` column, all 5 product types may coexist in one file.
        For per-type files (one type per export), pass `?type=VR|FA|AU|SD|EN` to force the type
        for every row. Fournisseurs must already exist; rows whose Fournisseur cannot be resolved are skipped with a French diagnostic.
      parameters:
        - in: query
          name: dry_run
          required: false
          schema: { type: string, enum: ["true", "false"] }
        - in: query
          name: type
          required: false
          schema: { type: string, enum: ["VR", "FA", "AU", "SD", "EN"] }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
              required: [file]
      responses:
        "200":
          description: Import report (real or dry-run)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportReport" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    ImportSkippedRow:
      type: object
      properties:
        row_number: { type: integer }
        reason: { type: string }
        raw_data: { type: object, additionalProperties: true }
      required: [row_number, reason, raw_data]

    ImportReport:
      type: object
      properties:
        total: { type: integer }
        imported: { type: integer }
        skipped_existing: { type: integer }
        skipped_error: { type: integer }
        skipped_rows:
          type: array
          items: { $ref: "#/components/schemas/ImportSkippedRow" }
        encoding: { type: string }
        encoding_note: { type: string }
        dry_run: { type: boolean }
      required: [total, imported, skipped_existing, skipped_error, skipped_rows, dry_run]

    # ── DASHBOARD ──
    DashboardStats:
      type: object
      properties:
        caMois:
          type: number
        devisEnAttente:
          type: object
          properties:
            n: { type: integer }
            montant: { type: number }
          required: [n, montant]
        facturesImpayees:
          type: object
          properties:
            n: { type: integer }
            montant: { type: number }
          required: [n, montant]
        nouveauxClients:
          type: integer
      required: [caMois, devisEnAttente, facturesImpayees, nouveauxClients]

    CaMensuel:
      type: object
      properties:
        mois:
          type: string
        total:
          type: number
      required: [mois, total]

    RecentDoc:
      type: object
      properties:
        id: { type: integer }
        numero: { type: string }
        client_nom: { type: string }
        client_prenom: { type: string }
        total_ttc: { type: number }
        statut: { type: string }
        cree_le: { type: string }
      required: [id, numero, client_nom, total_ttc, statut, cree_le]

    # ── CLIENTS ──
    Client:
      type: object
      properties:
        id: { type: integer }
        nom: { type: string }
        prenom: { type: string, nullable: true }
        email: { type: string, nullable: true }
        telephone: { type: string, nullable: true }
        adresse: { type: string, nullable: true }
        ville: { type: string, nullable: true }
        code_postal: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        cree_le: { type: string }
        modifie_le: { type: string }
        ca_total: { type: number, nullable: true }
        devis_count: { type: integer, nullable: true }
        derniere_activite: { type: string, nullable: true }
      required: [id, nom, cree_le, modifie_le]

    CreateClientBody:
      type: object
      properties:
        nom: { type: string }
        prenom: { type: string, nullable: true }
        email: { type: string, nullable: true }
        telephone: { type: string, nullable: true }
        adresse: { type: string, nullable: true }
        ville: { type: string, nullable: true }
        code_postal: { type: string, nullable: true }
        notes: { type: string, nullable: true }
      required: [nom]

    ClientStats:
      type: object
      properties:
        devisCount: { type: integer }
        facturesCount: { type: integer }
        caTotal: { type: number }
        devis:
          type: array
          items:
            $ref: "#/components/schemas/Devis"
        factures:
          type: array
          items:
            $ref: "#/components/schemas/Facture"
      required: [devisCount, facturesCount, caTotal, devis, factures]

    # ── PRODUITS ──
    Produit:
      type: object
      properties:
        id: { type: integer }
        reference: { type: string, nullable: true }
        designation: { type: string }
        type_code: { type: string, enum: [VR, FA, AU, SD, EN] }
        pricing_mode: { type: string, enum: [unit, linear_meter, square_meter] }
        type_produit: { type: string, nullable: true }
        fournisseur: { type: string, nullable: true }
        fournisseur_id: { type: integer, nullable: true }
        sous_categorie: { type: string, nullable: true }
        unite: { type: string, nullable: true }
        unite_calcul: { type: string }
        prix_achat_ht: { type: number, nullable: true }
        coefficient_marge: { type: number, nullable: true }
        prix_ht: { type: number }
        taux_tva: { type: number }
        largeur_mm: { type: number, nullable: true }
        epaisseur_mm: { type: number, nullable: true }
        longueur_barre_m: { type: number, nullable: true }
        stock_alerte: { type: integer, nullable: true }
        ref_legacy: { type: string, nullable: true }
        majo_epaisseur: { type: number, nullable: true }
        mini_fact_tn: { type: number, nullable: true }
        mini_fact_ta: { type: number, nullable: true }
        coef_marge_ta: { type: number, nullable: true }
        plus_value_ta_pct: { type: number, nullable: true }
        fac_mm: { type: integer, nullable: true }
        cadre_or_accessoire: { type: string, nullable: true }
        vendu: { type: boolean }
        actif: { type: integer }
        notes: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        cree_le: { type: string }
        modifie_le: { type: string }
      required: [id, designation, type_code, pricing_mode, unite_calcul, prix_ht, taux_tva, actif, vendu, cree_le, modifie_le]

    CreateProduitBody:
      type: object
      properties:
        reference: { type: string, nullable: true }
        designation: { type: string }
        type_code: { type: string, enum: [VR, FA, AU, SD, EN] }
        pricing_mode: { type: string, enum: [unit, linear_meter, square_meter] }
        type_produit: { type: string, nullable: true }
        fournisseur: { type: string, nullable: true }
        fournisseur_id: { type: integer, nullable: true }
        sous_categorie: { type: string, nullable: true }
        unite: { type: string, nullable: true }
        unite_calcul: { type: string }
        prix_achat_ht: { type: number, nullable: true }
