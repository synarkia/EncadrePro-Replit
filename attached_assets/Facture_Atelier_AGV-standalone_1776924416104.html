  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yle: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"bf36736d-5d84-45ef-b1ee-7565d4a2c676\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n/* =========================================================================\n   ATELIER AGV — Template de facture A4\n   Aesthetic : papeterie d'atelier / menu gastronomique\n   Type      : EB Garamond (wordmark, mentions) + Inter (corps, tableau)\n   Couleurs  : ivoire #faf7f2, encre #1a1a1a, laiton #9c7a3c (accent discret)\n   ======================================================================== */\n\n/* -------- Reset minimal & variables -------- */\n:root {\n  --ink:        #1a1a1a;\n  --ink-soft:   #3a3a3a;\n  --ink-mute:   #6a665f;\n  --rule:       #d9d3c6;\n  --rule-soft:  #ebe6da;\n  --paper:      #ffffff;\n  --ivoire:     #faf7f2;\n  --laiton:     #9c7a3c;\n\n  --serif:      \"EB Garamond\", \"Times New Roman\", Georgia, serif;\n  --sans:       \"Inter\", -apple-system, BlinkMacSystemFont, \"Helvetica Neue\", Arial, sans-serif;\n\n  --page-w:     210mm;\n  --page-h:     297mm;\n  --margin-x:   16mm;\n  --margin-y:   15mm;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml, body {\n  background: #e8e5dd;          /* gris doux autour de la feuille pour le preview écran */\n  color: var(--ink);\n  font-family: var(--sans);\n  font-size: 10pt;\n  line-height: 1.45;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* -------- Feuille A4 -------- */\n.sheet {\n  width: var(--page-w);\n  min-height: var(--page-h);\n  margin: 24px auto;\n  padding: var(--margin-y) var(--margin-x);\n  background: var(--paper);\n  box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 24px 48px -24px rgba(0,0,0,.18);\n  display: grid;\n  grid-template-rows: auto auto 1fr auto;\n  position: relative;\n}\n\n/* =========================================================================\n   1. EN-TÊTE — Wordmark, baseline, coordonnées\n   ======================================================================== */\n.masthead {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  align-items: start;\n  gap: 24px;\n  padding-bottom: 10mm;\n  border-bottom: 0.5pt solid var(--ink);\n}\n\n.brand__mark {\n  font-family: var(--serif);\n  font-weight: 500;\n  font-size: 26pt;\n  letter-spacing: 0.28em;\n  line-height: 1;\n  color: var(--ink);\n  padding-left: 2px;          /* compense le letter-spacing à gauche */\n}\n.brand__rule {\n  width: 48px;\n  height: 0.5pt;\n  background: var(--laiton);\n  margin: 10px 0 10px 2px;\n}\n.brand__baseline {\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: 11pt;\n  color: var(--ink-soft);\n  letter-spacing: 0.01em;\n}\n.brand__since {\n  margin-top: 6px;\n  font-family: var(--sans);\n  font-size: 7.5pt;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n\n.issuer {\n  text-align: right;\n  font-size: 8.5pt;\n  line-height: 1.55;\n  color: var(--ink-soft);\n  min-width: 60mm;\n}\n.issuer__name {\n  font-family: var(--serif);\n  font-size: 10pt;\n  color: var(--ink);\n  letter-spacing: 0.04em;\n  margin-bottom: 2px;\n}\n.issuer__legal {\n  margin-top: 6px;\n  padding-top: 6px;\n  border-top: 0.25pt solid var(--rule);\n  font-size: 7pt;\n  letter-spacing: 0.02em;\n  color: var(--ink-mute);\n  line-height: 1.6;\n}\n\n/* =========================================================================\n   2. META FACTURE + CLIENT\n   ======================================================================== */\n.docmeta {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 14mm;\n  padding: 10mm 0 8mm;\n  border-bottom: 0.25pt solid var(--rule);\n}\n\n/* — Bloc titre facture + numéros — */\n.doctitle {\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n.doctitle__kicker {\n  font-family: var(--sans);\n  font-size: 7.5pt;\n  letter-spacing: 0.28em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n.doctitle__main {\n  font-family: var(--serif);\n  font-size: 30pt;\n  font-weight: 500;\n  letter-spacing: 0.08em;\n  line-height: 1;\n  color: var(--ink);\n}\n.doctitle__number {\n  font-family: var(--sans);\n  font-size: 11pt;\n  font-weight: 500;\n  letter-spacing: 0.06em;\n  color: var(--ink);\n  margin-top: 2px;\n}\n\n.metafields {\n  margin-top: 10px;\n  display: grid;\n  grid-template-columns: auto 1fr;\n  gap: 4px 16px;\n  font-size: 9pt;\n}\n.metafields dt {\n  font-size: 7.5pt;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n  align-self: center;\n}\n.metafields dd {\n  color: var(--ink);\n  font-variant-numeric: tabular-nums;\n}\n\n/* — Bloc client — */\n.client {\n  padding-left: 14mm;\n  border-left: 0.25pt solid var(--rule);\n}\n.client__label {\n  font-size: 7.5pt;\n  letter-spacing: 0.28em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n  margin-bottom: 10px;\n}\n.client__name {\n  font-family: var(--serif);\n  font-size: 14pt;\n  font-weight: 500;\n  color: var(--ink);\n  letter-spacing: 0.02em;\n  line-height: 1.25;\n  margin-bottom: 6px;\n}\n.client__addr {\n  font-size: 9pt;\n  line-height: 1.55;\n  color: var(--ink-soft);\n  margin-bottom: 8px;\n}\n.client__legal {\n  font-size: 7.5pt;\n  letter-spacing: 0.04em;\n  color: var(--ink-mute);\n  line-height: 1.7;\n  padding-top: 6px;\n  border-top: 0.25pt dotted var(--rule);\n}\n.client__legal span + span::before {\n  content: \" · \";\n  color: var(--rule);\n}\n\n/* =========================================================================\n   3. TABLEAU PRESTATIONS\n   ======================================================================== */\n.lines {\n  margin-top: 10mm;\n}\n.lines__intro {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  margin-bottom: 6px;\n}\n.lines__intro h2 {\n  font-family: var(--serif);\n  font-size: 13pt;\n  font-weight: 500;\n  letter-spacing: 0.02em;\n  color: var(--ink);\n}\n.lines__intro small {\n  font-size: 7.5pt;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n\ntable.lines__table {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: 9pt;\n  font-variant-numeric: tabular-nums;\n}\n.lines__table thead th {\n  font-family: var(--sans);\n  font-weight: 500;\n  font-size: 7.5pt;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n  text-align: left;\n  padding: 8px 8px;\n  border-top: 0.5pt solid var(--ink);\n  border-bottom: 0.5pt solid var(--ink);\n}\n.lines__table th.num,\n.lines__table td.num { text-align: right; }\n.lines__table th.ctr,\n.lines__table td.ctr { text-align: center; }\n\n.lines__table tbody td {\n  padding: 10px 8px;\n  vertical-align: top;\n  border-bottom: 0.25pt solid var(--rule-soft);\n  color: var(--ink);\n}\n.lines__table tbody tr:last-child td { border-bottom: 0.5pt solid var(--ink); }\n\n.lines__desc  { width: 44%; }\n.lines__desc strong {\n  font-weight: 500;\n  color: var(--ink);\n  display: block;\n  margin-bottom: 2px;\n  font-size: 9.5pt;\n}\n.lines__desc small {\n  font-size: 8pt;\n  color: var(--ink-mute);\n  line-height: 1.5;\n  display: block;\n}\n\n.col-qty   { width: 8%; }\n.col-unit  { width: 10%; }\n.col-pu    { width: 14%; }\n.col-rem   { width: 10%; }\n.col-total { width: 14%; }\n\n/* =========================================================================\n   4. TOTAUX + CONDITIONS\n   ======================================================================== */\n.summary {\n  display: grid;\n  grid-template-columns: 1fr 82mm;\n  gap: 14mm;\n  margin-top: 8mm;\n}\n\n/* — Colonne gauche : conditions de règlement & échéance — */\n.terms {\n  font-size: 8.5pt;\n  line-height: 1.6;\n}\n.terms__label {\n  font-size: 7.5pt;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n  margin-bottom: 8px;\n}\n.terms__due {\n  font-family: var(--serif);\n  font-size: 13pt;\n  color: var(--ink);\n  letter-spacing: 0.02em;\n  margin-bottom: 4px;\n}\n.terms__due strong { font-weight: 500; }\n.terms__note {\n  color: var(--ink-soft);\n  max-width: 72mm;\n}\n\n.terms__pay {\n  margin-top: 10mm;\n  padding-top: 6mm;\n  border-top: 0.25pt solid var(--rule);\n}\n.terms__pay dl {\n  display: grid;\n  grid-template-columns: auto 1fr;\n  gap: 3px 14px;\n  font-size: 8.5pt;\n}\n.terms__pay dt {\n  font-size: 7.5pt;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n  align-self: center;\n}\n.terms__pay dd { color: var(--ink); font-variant-numeric: tabular-nums; }\n\n/* — Colonne droite : totaux — */\n.totals { font-size: 9pt; }\n.totals__row {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  padding: 5px 0;\n  border-bottom: 0.25pt solid var(--rule-soft);\n  font-variant-numeric: tabular-nums;\n}\n.totals__row.sub  { border-bottom: 0.5pt solid var(--ink); padding-top: 8px; }\n.totals__row.vat  { color: var(--ink-soft); }\n.totals__row.vat small {\n  font-size: 7.5pt;\n  color: var(--ink-mute);\n  letter-spacing: 0.04em;\n  margin-left: 6px;\n}\n\n.totals__row.grand {\n  margin-top: 6px;\n  padding: 14px 0 12px;\n  border-top: 0.5pt solid var(--ink);\n  border-bottom: 2pt double var(--ink);\n  font-family: var(--serif);\n  font-size: 14pt;\n  letter-spacing: 0.03em;\n}\n.totals__row.grand .totals__label { color: var(--ink); }\n\n.totals__row.net {\n  margin-top: 8px;\n  padding: 8px 10px;\n  background: var(--ivoire);\n  border: 0.25pt solid var(--rule);\n  border-bottom: 0.25pt solid var(--rule);\n  font-family: var(--serif);\n  font-size: 15pt;\n  color: var(--ink);\n  letter-spacing: 0.03em;\n}\n.totals__row.net .totals__value { font-weight: 500; }\n\n.totals__label {\n  color: var(--ink-soft);\n  font-family: var(--sans);\n  font-size: 9pt;\n  letter-spacing: 0.02em;\n}\n.totals__row.grand .totals__label,\n.tota
